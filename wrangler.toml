name = 'site-konverter'
main="worker/index.js"
compatibility_date = "2025-12-30"
compatibility_flags = [ "nodejs_compat" ]

[observability.logs]
enabled = false

[placement]
mode = "smart"

[assets]
directory = "./dist"
not_found_handling = "404-page"
run_worker_first = ["/~*"]

[[routes]]
pattern = "konverter.si"
custom_domain = true
